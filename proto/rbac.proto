syntax = "proto3";

package rbac;
import "google/protobuf/empty.proto";

option go_package = "abbassmortazavi/go-microservice/rbac;rbacpb";


service RBACService {
  rpc AssignPermissionToRole(AssignPermissionToRoleRequest) returns (google.protobuf.Empty);
  rpc AssignRoleToUser(AssignRoleToUserRequest) returns (google.protobuf.Empty);
  rpc CheckUserRole(CheckUserRoleRequest) returns (CheckUserRoleResponse);
}

message AssignPermissionToRoleRequest{
  int64 roleID = 1;
  int64 permissionID = 2;
}
message AssignRoleToUserRequest{
  int64 roleID = 1;
  int64 userID = 2;
}

message CheckUserRoleRequest{
  string role_name = 1;
  int64 userID = 2;
}


message CheckUserRoleResponse {
  bool hasRole = 1;
}

