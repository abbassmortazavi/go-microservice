apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: development

resources:
- api-gateway/deployment.yaml
- api-gateway/service.yaml
- auth-service/deployment.yaml
- auth-service/service.yaml
- postgres-service/deployment.yaml
- postgres-service/service.yaml
- postgres-service/pvc.yaml
- rabbitmq-service/deployment.yaml
- rabbitmq-service/service.yaml

labels:
- pairs:
    env: development

images:
  - name: api-gateway
    newName: abbass69/api-gateway
    newTag: c1bc037ea68317f6bfdbc5e0410578f433cf9d4f
  - name: auth-service
    newName: abbass69/auth-service
    newTag: c1bc037ea68317f6bfdbc5e0410578f433cf9d4f
