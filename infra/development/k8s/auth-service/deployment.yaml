apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: abbass69/auth-service:dev
#          image: microservice/auth-service:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 9092
          env:
            - name: ENVIRONMENT
              value: "development"
            - name: DB_HOST
              value: "postgres-service"
            - name: DB_PORT
              value: "5432"
            - name: DB_USERNAME
              value: "root"
            - name: DB_PASSWORD
              value: "root"
            - name: DB_NAME
              value: "microservice_db"
            - name: RABBITMQ_URI
              value: "amqp://guest:guest@rabbitmq:5672/"