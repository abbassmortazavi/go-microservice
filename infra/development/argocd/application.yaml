# argocd/apps/argocd-app.yml (یا microservice-production.yaml)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: development
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/abbassmortazavi/go-microservice.git
    targetRevision: develop
    path: infra/development/k8s  # ✅ مسیر جدید
  destination:
    server: https://kubernetes.default.svc
    namespace: development
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true