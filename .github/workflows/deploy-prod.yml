name: Deploy to Production

concurrency:
  group: production
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "confirm" to deploy to production'
        required: true
        type: string
  push:
    branches: ["main"]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  approval:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    steps:
      - name: Check confirmation
        id: check
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "confirm" ]; then
            echo "❌ You must type 'confirm' to deploy to production."
            exit 1
          fi
          echo "✅ Confirmation received."
          echo "approved=true" >> $GITHUB_OUTPUT

  tests:
    needs: []
    uses: ./.github/workflows/run-tests.yml
    secrets: inherit
    with:
      environment: 'production'

  build:
    needs: tests
    if: |
      always() &&
      needs.tests.result == 'success' &&
      (github.event_name == 'push' || needs.approval.result == 'success')
    uses: ./.github/workflows/run-build.yml
    secrets: inherit
    with:
      environment: 'production'

  deploy:
    needs: build
    if: needs.build.result == 'success'
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      environment: 'production'

  report:
    name: Deployment Report
    needs: [tests, build, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate report
        run: |
          echo "📊 Deployment Report"
          echo "Environment : Production"
          echo "Branch      : ${{ github.ref_name }}"
          echo "Commit      : ${{ github.sha }}"
          echo "Timestamp   : $(date -u)"
          echo "Tests       : ${{ needs.tests.result }}"
          echo "Build       : ${{ needs.build.result }}"
          echo "Deploy      : ${{ needs.deploy.result }}"

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: deployment-report-prod-${{ github.sha }}
          path: report.md