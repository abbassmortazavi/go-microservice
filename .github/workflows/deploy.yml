name: Deploy to Kubernetes

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ vars.DEPLOYMENT_URL || '' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          # pull latest commit که kustomize update کرده
          fetch-depth: 0

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Set namespace
        run: |
          if [ "${{ inputs.environment }}" = "development" ]; then
            echo "NAMESPACE=microservice-dev" >> $GITHUB_ENV
            echo "K8S_PATH=infra/development/k8s" >> $GITHUB_ENV
          else
            echo "NAMESPACE=microservice-prod" >> $GITHUB_ENV
            echo "K8S_PATH=infra/production/k8s" >> $GITHUB_ENV
          fi

      - name: Apply manifests
        run: |
          echo "🚀 Deploying to ${{ inputs.environment }}"
          echo "📁 Path: ${{ env.K8S_PATH }}"
          kubectl apply -k ${{ env.K8S_PATH }}/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/api-gateway -n ${{ env.NAMESPACE }} --timeout=120s
          kubectl rollout status deployment/auth-service -n ${{ env.NAMESPACE }} --timeout=120s
          echo "✅ Deployment complete"