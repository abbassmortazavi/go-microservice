name: Build And Push Docker Images

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        default: 'development'

env:
  DOCKER_HUB_ORG: abbass69

jobs:
  build-api-gateway:
    name: Build API Gateway
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set image meta
        id: meta
        run: |
          echo "image_name=abbass69/api-gateway" >> $GITHUB_OUTPUT
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/development/docker/api-gateway/api-gateway.Dockerfile
          push: true
          tags: |
            abbass69/api-gateway:${{ inputs.environment == 'production' && 'latest' || 'dev' }}
            abbass69/api-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  build-auth-service:
    name: Build Auth Service
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set image meta
        id: meta
        run: |
          echo "image_name=abbass69/auth-service" >> $GITHUB_OUTPUT
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/development/docker/auth-service/auth-service.Dockerfile
          push: true
          tags: |
            abbass69/auth-service:${{ inputs.environment == 'production' && 'latest' || 'dev' }}
            abbass69/auth-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  build-notification-service:
    name: Build Notification Service
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set image meta
        id: meta
        run: |
          echo "image_name=abbass69/notification-service" >> $GITHUB_OUTPUT
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Notification Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/development/docker/notification-service/notification-service.Dockerfile
          push: true
          tags: |
            abbass69/notification-service:${{ inputs.environment == 'production' && 'latest' || 'dev' }}
            abbass69/notification-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  update-kustomize:
    name: Update Kustomize Images
    needs: [build-api-gateway, build-auth-service, build-notification-service]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref_name }}

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.3.0"

      - name: Update kustomization
        run: |
          if [ "${{ inputs.environment }}" = "development" ]; then
            K8S_PATH="infra/development/k8s"
          else
            K8S_PATH="infra/production/k8s"
          fi

          cd $K8S_PATH

          # فقط image tag رو آپدیت کن - ساده و بدون دردسر
          kustomize edit set image abbass69/api-gateway=${{ needs.build-api-gateway.outputs.image_name }}:${{ needs.build-api-gateway.outputs.image_tag }}
          kustomize edit set image abbass69/auth-service=${{ needs.build-auth-service.outputs.image_name }}:${{ needs.build-auth-service.outputs.image_tag }}
          kustomize edit set image abbass69/notification-service=${{ needs.build-notification-service.outputs.image_name }}:${{ needs.build-notification-service.outputs.image_tag }}

          echo "✅ kustomization.yaml updated:"
          cat kustomization.yaml

      - name: Commit updated image tags
        env:
          GIT_USER: "github-actions[bot]"
          GIT_EMAIL: "github-actions[bot]@users.noreply.github.com"
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "$GIT_USER"
          git config user.email "$GIT_EMAIL"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

          git add infra/
          git commit -m "ci: update image tags for ${{ inputs.environment }} [skip ci]"
          git pull origin ${{ github.ref_name }} --rebase
          git push origin ${{ github.ref_name }}